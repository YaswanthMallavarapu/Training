<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <!-- navbar -->

    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand">Navbar</a>
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-primary" type="submit">Search</button>
                &nbsp;
                 <button class="btn btn-success" type="submit">Logout</button>

            </form>
        </div>
    </nav>

    <!-- entire page -->
    <div class="row p-1">


        <!-- sidebar -->
        <div class="col-lg-3 sidebar mt-2 p-4">
            <p class="sidebar-item">Dashboard</p>
            <p class="sidebar-item">Employees</p>
            <p class="sidebar-item">Assets</p>
            <p class="sidebar-item">Service Requests</p>
            <p class="sidebar-item">AssetRequests</p>
            <p class="sidebar-item">Audits</p>

        </div>

        <!-- content -->
        <div class="col-lg-8 mt-2 p-4">
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>employee-icon</p>
                        </div>
                        <div class="widget-number ">
                            <p>1230</p>
                        </div>
                        <div class="matter">
                            <p>Total Employees</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>asset-icon</p>
                        </div>
                        <div class="widget-number asset">
                            <p>2347</p>
                        </div>
                        <div class="matter">
                            <p>Total asset</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>asset request-icon</p>
                        </div>
                        <div class="widget-number asset-request">
                            <p>126</p>
                        </div>
                        <div class="matter">
                            <p>Total asset request</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>service request-icon</p>
                        </div>
                        <div class="widget-number service-request">
                            <p>243</p>
                        </div>
                        <div class="matter">
                            <p>Total Service request</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>audit-icon</p>
                        </div>
                        <div class="widget-number audit">
                            <p>5</p>
                        </div>
                        <div class="matter">
                            <p>Total Audits</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>


</html>
